name: Test GitHub Environment Secrets

on:
  workflow_dispatch:
#  pull_request:
#    branches:
#      - dev
#      - prod  # or 'main', depending on your setup

jobs:
  test-secrets:
    name: 'Test Secret Retrieval'
    runs-on: ubuntu-latest
#    environment: ${{ github.event.pull_request.base.ref || github.ref_name }}  # Dynamic environment selection

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Determine Environment
        id: determine-environment
        run: |
          if [[ "${{ github.event.pull_request.base.ref || github.ref_name }}" == "dev" ]]; then
            echo "Selected Environment: dev"
          elif [[ "${{ github.event.pull_request.base.ref || github.ref_name }}" == "prod" ]]; then
            echo "Selected Environment: prod"
          else
            echo "❌ Unsupported branch or base ref"
            exit 1
          fi

      - name: Check If Secrets Exist (Without Printing)
        run: |
          if [[ -n "$SNOWFLAKE_USER" ]]; then
            echo "✅ SNOWFLAKE_USER is set"
          else
            echo "❌ SNOWFLAKE_USER is missing"
          fi
          
          if [[ -n "$SNOWFLAKE_PRIVATE_KEY" ]]; then
            echo "✅ SNOWFLAKE_PRIVATE_KEY is set"
          else
            echo "❌ SNOWFLAKE_PRIVATE_KEY is missing"
          fi
          echo "Base Ref: ${{ github.base_ref }}"
          echo "PR Base Ref: ${{ github.event.pull_request.base.ref }}"
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
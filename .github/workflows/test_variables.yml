name: Test GitHub Environment Secrets

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - prod  # or 'main', depending on your setup

jobs:
  test-secrets:
    name: 'Test Secret Retrieval'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Determine Environment and Secrets
        id: determine-environment
        run: |
          if [[ "${{ github.event.pull_request.base.ref }}" == "dev" ]]; then
            echo "Selected Environment: dev"
            echo "SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER_DEV }}" >> $GITHUB_ENV
            echo "SNOWFLAKE_PRIVATE_KEY=${{ secrets.SNOWFLAKE_PRIVATE_KEY_DEV }}" >> $GITHUB_ENV
          elif [[ "${{ github.event.pull_request.base.ref }}" == "prod" ]]; then
            echo "Selected Environment: prod"
            echo "SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER_PROD }}" >> $GITHUB_ENV
            echo "SNOWFLAKE_PRIVATE_KEY=${{ secrets.SNOWFLAKE_PRIVATE_KEY_PROD }}" >> $GITHUB_ENV
          else
            echo "Selected Environment: feature"
            echo "SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER_FEATURE }}" >> $GITHUB_ENV
            echo "SNOWFLAKE_PRIVATE_KEY=${{ secrets.SNOWFLAKE_PRIVATE_KEY_FEATURE }}" >> $GITHUB_ENV
          fi

      - name: Check If Secrets Exist (Without Printing)
        run: |
          if [[ -n "$SNOWFLAKE_USER" ]]; then
            echo "✅ SNOWFLAKE_USER is set"
          else
            echo "❌ SNOWFLAKE_USER is missing"
          fi
          
          if [[ -n "$SNOWFLAKE_PRIVATE_KEY" ]]; then
            echo "✅ SNOWFLAKE_PRIVATE_KEY is set"
          else
            echo "❌ SNOWFLAKE_PRIVATE_KEY is missing"
          fi
          echo "Base Ref: ${{ github.base_ref }}"
          echo "PR Base Ref: ${{ github.event.pull_request.base.ref }}"
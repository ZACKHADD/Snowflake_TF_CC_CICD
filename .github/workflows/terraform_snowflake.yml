name: Terraform Dynamic Deployment

on:
  workflow_dispatch:
#  pull_request:
#    branches:
#      - dev
#      - prod

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    environment: ${{github.ref_name }}
    env:
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }} 
      ARM_SAS_TOKEN: ${{ secrets.ARM_SAS_TOKEN }} 
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform
        run: terraform init
        working-directory: environment

      - name: Check Terraform Formatting
        run: terraform fmt -recursive
        working-directory: environment

      - name: Validate Terraform Configuration
        run: terraform validate
        working-directory: environment
        
      - name: Decode SNOWFLAKE_PRIVATE_KEY
        run: |
          echo "Decoding SNOWFLAKE_PRIVATE_KEY..."
          printf "%s" "$SNOWFLAKE_PRIVATE_KEY" | base64 --decode > snowflake_private_key.p8
          echo "SNOWFLAKE_DECODED_PRIVATE_KEY=$(echo $SNOWFLAKE_PRIVATE_KEY | base64 --decode)" >> $GITHUB_ENV
          ls -lah snowflake_private_key.p8
#         echo "SNOWFLAKE_PRIVATE_KEY_PATH=$(pwd)/snowflake_private_key.p8" >> $GITHUB_ENV
        shell: bash
        
      - name: Plan Terraform
        run: |
          if [ ! -s "$SNOWFLAKE_DECODED_PRIVATE_KEY" ]; then
            echo "❌ SNOWFLAKE_DECODED_PRIVATE_KEY is empty!"
            exit 1
          else
            echo "✅ SNOWFLAKE_DECODED_PRIVATE_KEY is correctly decoded!"
          fi
#          echo "SNOWFLAKE_PRIVATE_KEY=$(echo $SNOWFLAKE_PRIVATE_KEY_B64 | base64 --decode)" >> $GITHUB_ENV
#          terraform plan -var="SNOWFLAKE_USER=$SNOWFLAKE_USER" -var="SNOWFLAKE_PRIVATE_KEY=$SNOWFLAKE_PRIVATE_KEY" -var-file=terraform.tfvars
        working-directory: environment

      - name: Verify SNOWFLAKE_PRIVATE_KEY
        run: |

          if [ -z "$SNOWFLAKE_DECODED_PRIVATE_KEY" ]; then
            echo "❌ SNOWFLAKE_DECODED_PRIVATE_KEY is missing!"
            exit 1
          else
            echo "✅ SNOWFLAKE_DECODED_PRIVATE_KEY is set!"
          fi
  #        echo "SNOWFLAKE_PRIVATE_KEY=$(echo $SNOWFLAKE_PRIVATE_KEY_B64 | base64 --decode)" >> $GITHUB_ENV          
        working-directory: environment
        
#      - name: Apply Terraform
#        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true   # if we activate the PR here
#        run: |
#          echo "SNOWFLAKE_PRIVATE_KEY=$(echo $SNOWFLAKE_PRIVATE_KEY_B64 | base64 --decode)" >> $GITHUB_ENV
#          terraform apply -auto-approve -var="SNOWFLAKE_USER=$SNOWFLAKE_USER" -var="SNOWFLAKE_PRIVATE_KEY=$SNOWFLAKE_PRIVATE_KEY" -var-file=terraform.tfvars

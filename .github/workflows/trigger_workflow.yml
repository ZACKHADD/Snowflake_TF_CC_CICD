name: Trigger Dev/Prod Workflow

on:
  pull_request:
    branches:
      - dev
      - prod  # or 'main', depending on your setup

jobs:
  trigger-workflow:
    name: 'Trigger Dev/Prod Workflow'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Print Target Branch
        run: |
          echo "Target Branch: ${{ github.event.pull_request.base.ref }}"

      - name: Trigger Dev/Prod Workflow
        uses: actions/github-script@v6
        with:
#          github-token: ${{ secrets.REPO_PAT }}  # Use the PAT for authentication
          script: |
            try {
              const response = await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'test_variables.yml',  // Name of the second workflow
                ref: '${{ github.event.pull_request.base.ref }}',  // Target branch (dev or prod)
              });
              console.log(`Workflow dispatch successful! Status: ${response.status}`);
            } catch (error) {
              console.error(`Error triggering workflow: ${error.message}`);
              console.error(`Error details: ${JSON.stringify(error, null, 2)}`);
              throw error;
            }